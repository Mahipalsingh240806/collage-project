<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up - LifeCare</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .signup-wrapper {
      width: 100%;
      max-width: 430px;
    }

    .signup-header {
      text-align: center;
      margin-bottom: 18px;
    }

    .signup-header h2 {
      margin-bottom: 8px;
      color: #1f2d3d;
      font-size: 28px;
    }

    .signup-subtitle {
      color: #667085;
      font-size: 14px;
      line-height: 1.5;
    }

    .input-group {
      margin-bottom: 14px;
      text-align: left;
    }

    .input-group label {
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
      font-weight: 600;
      color: #344054;
    }

    .input-group input {
      width: 100%;
      padding: 13px 14px;
      border: 1px solid #d0d5dd;
      border-radius: 10px;
      font-size: 15px;
      outline: none;
      transition: 0.3s ease;
    }

    .input-group input:focus {
      border-color: #1565c0;
      box-shadow: 0 0 0 3px rgba(21, 101, 192, 0.12);
    }

    .main-btn {
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, #1565c0, #0d47a1);
      color: white;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s ease;
      margin-top: 6px;
    }

    .main-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 20px rgba(21, 101, 192, 0.25);
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 18px 0;
      color: #98a2b3;
      font-size: 13px;
      font-weight: 600;
    }

    .divider::before,
    .divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: #e4e7ec;
    }

    .google-btn {
      width: 100%;
      padding: 13px;
      border-radius: 10px;
      border: 1px solid #d0d5dd;
      background: #fff;
      color: #1f2937;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s ease;
    }

    .google-btn:hover {
      background: #f9fafb;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.08);
    }

    .status-msg {
      margin-top: 14px;
      min-height: 22px;
      text-align: center;
      font-size: 14px;
      font-weight: 600;
      word-break: break-word;
    }

    .small-text {
      font-size: 13px;
      color: #667085;
      margin-top: 16px;
      text-align: center;
      line-height: 1.5;
    }

    .link-btn {
      background: none;
      border: none;
      color: #1565c0;
      cursor: pointer;
      padding: 0;
      font-size: 14px;
      font-weight: 700;
    }

    .link-btn:hover {
      text-decoration: underline;
    }

    .note-box {
      margin-top: 14px;
      padding: 10px 12px;
      border-radius: 10px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      font-size: 12px;
      color: #475467;
      line-height: 1.5;
      text-align: left;
    }

    @media (max-width: 480px) {
      .signup-wrapper {
        max-width: 100%;
      }

      .signup-header h2 {
        font-size: 24px;
      }
    }
  </style>
</head>
<body class="login-page">

  <div class="box signup-wrapper">
    <div class="signup-header">
      <h2>Create Account</h2>
      <p class="signup-subtitle">
        Sign up to join LifeCare Blood & Health Support
      </p>
    </div>

    <div class="input-group">
      <label for="newUser">Email Address</label>
      <input type="email" id="newUser" placeholder="Enter your email" />
    </div>

    <div class="input-group">
      <label for="newPass">Password</label>
      <input type="password" id="newPass" placeholder="Enter password" />
    </div>

    <button class="main-btn" onclick="register()">Create Account</button>

    <div class="divider">OR</div>

    <button class="google-btn" onclick="googleSignup()">Continue with Google</button>

    <div id="statusMessage" class="status-msg"></div>

    <div class="note-box">
      Google sign up tabhi sahi chalega jab page <strong>Live Server</strong> ya <strong>http://localhost</strong> par open ho.
      Agar tum file ko direct double click karke open karoge, to Google login kaam nahi karega.
    </div>

    <p class="small-text">
      Already have an account?
      <button class="link-btn" onclick="goToLogin()">Login</button>
    </p>
  </div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDtZhr0uHblIoWKAxmXIdeiW5ThvlGmFUg",
      authDomain: "health-care-3944b.firebaseapp.com",
      projectId: "health-care-3944b",
      storageBucket: "health-care-3944b.appspot.com",
      messagingSenderId: "157502935550",
      appId: "1:157502935550:web:e3683dcf20aee195a1f0af"
    };

    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }

    const auth = firebase.auth();

    auth.onAuthStateChanged((user) => {
      if (user) {
        window.location.href = "home.html";
      }
    });

    function setStatus(message, color = "red") {
      const status = document.getElementById("statusMessage");
      status.style.color = color;
      status.innerText = message;
    }

    function isValidEnvironment() {
      const protocol = window.location.protocol;
      return protocol === "http:" || protocol === "https:";
    }

    function register() {
      const email = document.getElementById("newUser").value.trim();
      const password = document.getElementById("newPass").value.trim();

      if (!email || !password) {
        setStatus("Please fill all fields.");
        return;
      }

      if (password.length < 6) {
        setStatus("Password must be at least 6 characters.");
        return;
      }

      setStatus("Creating account...", "#1565c0");

      auth.createUserWithEmailAndPassword(email, password)
        .then(() => {
          setStatus("Account created successfully ✅", "green");
          window.location.href = "home.html";
        })
        .catch((error) => {
          if (error.code === "auth/email-already-in-use") {
            setStatus("This email is already registered.");
          } else if (error.code === "auth/invalid-email") {
            setStatus("Please enter a valid email address.");
          } else if (error.code === "auth/weak-password") {
            setStatus("Password is too weak.");
          } else {
            setStatus(error.message);
          }
        });
    }

    function googleSignup() {
      if (!isValidEnvironment()) {
        setStatus("Google sign in ke liye page ko Live Server par open karo. Direct file open mat karo.");
        return;
      }

      const provider = new firebase.auth.GoogleAuthProvider();

      setStatus("Opening Google sign up...", "#1565c0");

      auth.signInWithPopup(provider)
        .then(() => {
          setStatus("Google sign up successful ✅", "green");
          window.location.href = "home.html";
        })
        .catch((error) => {
          if (
            error.code === "auth/popup-blocked" ||
            error.code === "auth/popup-closed-by-user" ||
            error.code === "auth/cancelled-popup-request" ||
            error.code === "auth/operation-not-supported-in-this-environment"
          ) {
            auth.signInWithRedirect(provider);
          } else if (error.code === "auth/unauthorized-domain") {
            setStatus("Authorized domain set nahi hai. Firebase console me domain add karo.");
          } else {
            setStatus(error.message);
          }
        });
    }

    auth.getRedirectResult()
      .then((result) => {
        if (result.user) {
          setStatus("Google sign up successful ✅", "green");
          window.location.href = "home.html";
        }
      })
      .catch((error) => {
        if (error.code) {
          setStatus(error.message);
        }
      });

    function goToLogin() {
      window.location.href = "index.html";
    }
  </script>
</body>
</html>
