<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Book Appointment - LifeCare</title>
  <link rel="stylesheet" href="style.css" />

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #f4f9ff, #eef5fc);
      color: #223247;
    }

    .page-wrap {
      max-width: 1180px;
      margin: 0 auto;
      padding: 28px 16px 50px;
    }

    .top-banner {
      background: linear-gradient(135deg, #c62828, #e53935);
      color: white;
      border-radius: 24px;
      padding: 30px;
      box-shadow: 0 14px 34px rgba(198, 40, 40, 0.18);
      margin-bottom: 26px;
    }

    .top-banner h1 {
      margin: 0 0 10px;
      font-size: 34px;
    }

    .top-banner p {
      margin: 0;
      line-height: 1.7;
      opacity: 0.96;
      max-width: 840px;
    }

    .top-actions {
      margin-top: 18px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .top-actions a {
      display: inline-block;
      padding: 11px 16px;
      border-radius: 12px;
      background: white;
      color: #c62828;
      text-decoration: none;
      font-weight: bold;
      transition: 0.3s ease;
    }

    .top-actions a:hover {
      transform: translateY(-2px);
    }

    .appointment-layout {
      display: grid;
      grid-template-columns: 0.95fr 1.05fr;
      gap: 24px;
    }

    .panel {
      background: white;
      border: 1px solid #e4edf7;
      border-radius: 22px;
      box-shadow: 0 14px 34px rgba(0, 0, 0, 0.06);
      padding: 24px;
    }

    .panel h2 {
      margin: 0 0 16px;
      color: #c62828;
      font-size: 24px;
    }

    .hospital-card {
      background: linear-gradient(135deg, #fff8f8, #fff);
      border: 1px solid #f0d7d7;
      border-radius: 18px;
      padding: 20px;
      margin-bottom: 18px;
    }

    .hospital-card h3 {
      margin: 0 0 8px;
      font-size: 24px;
      color: #1f3147;
    }

    .hospital-card p {
      margin: 8px 0;
      color: #526173;
      line-height: 1.6;
      font-size: 15px;
    }

    .mini-badge {
      display: inline-block;
      padding: 8px 12px;
      border-radius: 999px;
      background: #fff4df;
      color: #d97706;
      font-weight: bold;
      font-size: 13px;
      margin-right: 8px;
      margin-top: 8px;
    }

    .help-box {
      background: linear-gradient(135deg, #203149, #304766);
      color: white;
      border-radius: 18px;
      padding: 20px;
    }

    .help-box h3 {
      margin: 0 0 10px;
      font-size: 20px;
    }

    .help-box p {
      margin: 8px 0;
      line-height: 1.7;
      color: rgba(255,255,255,0.92);
      font-size: 14px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
    }

    .form-group.full {
      grid-column: 1 / -1;
    }

    .form-group label {
      margin-bottom: 8px;
      font-weight: bold;
      color: #223247;
      font-size: 14px;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      border: 1px solid #d9e5f1;
      border-radius: 12px;
      padding: 13px 14px;
      font-size: 15px;
      outline: none;
      transition: 0.3s ease;
      background: #fbfdff;
    }

    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      border-color: #c62828;
      box-shadow: 0 0 0 4px rgba(198, 40, 40, 0.08);
      background: white;
    }

    .form-group textarea {
      min-height: 110px;
      resize: vertical;
    }

    .submit-row {
      margin-top: 20px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }

    .submit-btn {
      border: none;
      background: linear-gradient(135deg, #c62828, #e53935);
      color: white;
      padding: 14px 24px;
      border-radius: 14px;
      font-weight: bold;
      font-size: 15px;
      cursor: pointer;
      box-shadow: 0 10px 22px rgba(198, 40, 40, 0.2);
      transition: 0.3s ease;
    }

    .submit-btn:hover {
      transform: translateY(-2px);
    }

    .status-box {
      margin-top: 18px;
      padding: 14px 16px;
      border-radius: 14px;
      font-size: 14px;
      display: none;
    }

    .status-success {
      background: #ecfdf3;
      border: 1px solid #b7ebc6;
      color: #166534;
      display: block;
    }

    .status-error {
      background: #fff1f2;
      border: 1px solid #fecdd3;
      color: #be123c;
      display: block;
    }

    .loading-box {
      padding: 30px;
      text-align: center;
      color: #64748b;
      border: 1px dashed #d1d9e6;
      border-radius: 18px;
      background: white;
    }

    @media (max-width: 920px) {
      .appointment-layout {
        grid-template-columns: 1fr;
      }

      .form-grid {
        grid-template-columns: 1fr;
      }

      .top-banner h1 {
        font-size: 28px;
      }
    }
  </style>
</head>
<body>
  <div class="page-wrap">
    <div class="top-banner">
      <h1>Book Hospital Appointment</h1>
      <p>
        Fill in your details to request an appointment with your selected hospital.
        Your request will be saved properly so the hospital can review your information
        and contact you or manage your visit timing.
      </p>

      <div class="top-actions">
        <a id="backToHospitalBtn" href="hospital-search.html">← Back</a>
        <a href="hospital-search.html">Search More Hospitals</a>
        <a href="home.html">🏠 Home</a>
      </div>
    </div>

    <div id="appointmentContent" class="loading-box">Loading hospital information...</div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDtZhr0uHblIoWKAxmXIdeiW5ThvlGmFUg",
      authDomain: "health-care-3944b.firebaseapp.com",
      projectId: "health-care-3944b",
      storageBucket: "health-care-3944b.appspot.com",
      messagingSenderId: "157502935550",
      appId: "1:157502935550:web:e3683dcf20aee195a1f0af"
    };

    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }

    const db = firebase.firestore();
    const auth = firebase.auth();

    const params = new URLSearchParams(window.location.search);
    const hospitalId = params.get("id");
    const appointmentContent = document.getElementById("appointmentContent");
    const backToHospitalBtn = document.getElementById("backToHospitalBtn");

    function safeText(value, fallback = "Not available") {
      return value && String(value).trim() ? String(value).trim() : fallback;
    }

    function getTodayDate() {
      const today = new Date();
      const year = today.getFullYear();
      const month = String(today.getMonth() + 1).padStart(2, "0");
      const day = String(today.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function renderAppointmentPage(hospitalData) {
      const hospitalName = safeText(hospitalData.hospitalName, "Selected Hospital");
      const city = safeText(hospitalData.city);
      const type = safeText(hospitalData.hospitalType);
      const rating = safeText(hospitalData.rating, "4.5");
      const contact = safeText(hospitalData.contact);
      const address = safeText(hospitalData.address);
      const opdTiming = safeText(hospitalData.opdTiming, "5:00pm To 8:00pm");

      backToHospitalBtn.href = `hospital-details.html?id=${hospitalId}`;

      appointmentContent.innerHTML = `
        <div class="appointment-layout">
          <div class="panel">
            <h2>Selected Hospital</h2>

            <div class="hospital-card">
              <h3>${hospitalName}</h3>
              <p><strong>Type:</strong> ${type}</p>
              <p><strong>City:</strong> ${city}</p>
              <p><strong>Contact:</strong> ${contact}</p>
              <p><strong>Address:</strong> ${address}</p>
              <p><strong>OPD Timing:</strong> ${opdTiming}</p>

              <span class="mini-badge">${type}</span>
              <span class="mini-badge">${city}</span>
              <span class="mini-badge">⭐ ${rating} / 5</span>
            </div>

            <div class="help-box">
              <h3>Appointment Process</h3>
              <p>1. Patient apna form fill karega.</p>
              <p>2. Preferred date aur time choose karega.</p>
              <p>3. Appointment request Firebase me save hogi.</p>
              <p>4. Hospital patient record dekh sakega.</p>
              <p>5. Patient ko requested timing ke saath entry mil jayegi.</p>
            </div>
          </div>

          <div class="panel">
            <h2>Patient Appointment Form</h2>

            <form id="appointmentForm">
              <div class="form-grid">
                <div class="form-group">
                  <label for="patientName">Patient Full Name</label>
                  <input type="text" id="patientName" placeholder="Enter full name" required />
                </div>

                <div class="form-group">
                  <label for="patientAge">Age</label>
                  <input type="number" id="patientAge" min="1" max="120" placeholder="Enter age" required />
                </div>

                <div class="form-group">
                  <label for="patientGender">Gender</label>
                  <select id="patientGender" required>
                    <option value="">Select gender</option>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                    <option value="Other">Other</option>
                  </select>
                </div>

                <div class="form-group">
                  <label for="patientPhone">Phone Number</label>
                  <input type="tel" id="patientPhone" placeholder="Enter mobile number" required />
                </div>

                <div class="form-group">
                  <label for="patientEmail">Email</label>
                  <input type="email" id="patientEmail" placeholder="Enter email address" />
                </div>

                <div class="form-group">
                  <label for="patientCity">City</label>
                  <input type="text" id="patientCity" placeholder="Enter city" required />
                </div>

                <div class="form-group">
                  <label for="appointmentDate">Appointment Date</label>
                  <input type="date" id="appointmentDate" required />
                </div>

                <div class="form-group">
                  <label for="appointmentTime">Preferred Time</label>
                  <select id="appointmentTime" required>
                    <option value="">Select preferred time</option>
                    <option value="09:00 AM">09:00 AM</option>
                    <option value="10:00 AM">10:00 AM</option>
                    <option value="11:00 AM">11:00 AM</option>
                    <option value="12:00 PM">12:00 PM</option>
                    <option value="01:00 PM">01:00 PM</option>
                    <option value="02:00 PM">02:00 PM</option>
                    <option value="03:00 PM">03:00 PM</option>
                    <option value="04:00 PM">04:00 PM</option>
                    <option value="05:00 PM">05:00 PM</option>
                    <option value="06:00 PM">06:00 PM</option>
                  </select>
                </div>

                <div class="form-group full">
                  <label for="problemDescription">Problem / Symptoms</label>
                  <textarea id="problemDescription" placeholder="Write your symptoms or reason for appointment" required></textarea>
                </div>

                <div class="form-group full">
                  <label for="patientAddress">Address</label>
                  <textarea id="patientAddress" placeholder="Enter full address"></textarea>
                </div>
              </div>

              <div class="submit-row">
                <button type="submit" class="submit-btn">Submit Appointment Request</button>
              </div>

              <div id="formStatus" class="status-box"></div>
            </form>
          </div>
        </div>
      `;

      const appointmentDate = document.getElementById("appointmentDate");
      appointmentDate.min = getTodayDate();
      appointmentDate.value = getTodayDate();

      const appointmentForm = document.getElementById("appointmentForm");
      const formStatus = document.getElementById("formStatus");

      auth.onAuthStateChanged((user) => {
        if (user) {
          const emailField = document.getElementById("patientEmail");
          if (emailField && !emailField.value) {
            emailField.value = user.email || "";
          }
        }
      });

      appointmentForm.addEventListener("submit", function (e) {
        e.preventDefault();

        const patientName = document.getElementById("patientName").value.trim();
        const patientAge = document.getElementById("patientAge").value.trim();
        const patientGender = document.getElementById("patientGender").value;
        const patientPhone = document.getElementById("patientPhone").value.trim();
        const patientEmail = document.getElementById("patientEmail").value.trim();
        const patientCity = document.getElementById("patientCity").value.trim();
        const appointmentDateValue = document.getElementById("appointmentDate").value;
        const appointmentTime = document.getElementById("appointmentTime").value;
        const problemDescription = document.getElementById("problemDescription").value.trim();
        const patientAddress = document.getElementById("patientAddress").value.trim();

        if (
          !patientName ||
          !patientAge ||
          !patientGender ||
          !patientPhone ||
          !patientCity ||
          !appointmentDateValue ||
          !appointmentTime ||
          !problemDescription
        ) {
          formStatus.className = "status-box status-error";
          formStatus.innerText = "Please fill all required fields properly.";
          return;
        }

        const submitBtn = appointmentForm.querySelector(".submit-btn");
        submitBtn.disabled = true;
        submitBtn.innerText = "Submitting...";

        const currentUser = auth.currentUser;

        const appointmentData = {
          hospitalDocId: hospitalId,
          hospitalName: hospitalName,
          hospitalType: type,
          hospitalCity: city,
          hospitalContact: contact,
          patientName: patientName,
          patientAge: patientAge,
          patientGender: patientGender,
          patientPhone: patientPhone,
          patientEmail: patientEmail,
          patientCity: patientCity,
          patientAddress: patientAddress,
          problemDescription: problemDescription,
          appointmentDate: appointmentDateValue,
          appointmentTime: appointmentTime,
          status: "Pending",
          userId: currentUser ? currentUser.uid : "",
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        };

        db.collection("appointments")
          .add(appointmentData)
          .then(() => {
            formStatus.className = "status-box status-success";
            formStatus.innerHTML = `
              Appointment request submitted successfully ✅<br><br>
              <strong>Hospital:</strong> ${hospitalName}<br>
              <strong>Date:</strong> ${appointmentDateValue}<br>
              <strong>Time:</strong> ${appointmentTime}<br>
              <strong>Status:</strong> Pending
            `;

            appointmentForm.reset();
            document.getElementById("appointmentDate").value = getTodayDate();
          })
          .catch((error) => {
            formStatus.className = "status-box status-error";
            formStatus.innerText = "Error: " + error.message;
          })
          .finally(() => {
            submitBtn.disabled = false;
            submitBtn.innerText = "Submit Appointment Request";
          });
      });
    }

    if (!hospitalId) {
      appointmentContent.innerHTML = "Invalid hospital ID. Please go back and select a hospital again.";
    } else {
      db.collection("hospitals").doc(hospitalId).get()
        .then((doc) => {
          if (!doc.exists) {
            appointmentContent.innerHTML = "Selected hospital not found.";
            return;
          }

          renderAppointmentPage(doc.data());
        })
        .catch((error) => {
          console.error(error);
          appointmentContent.innerHTML = "Hospital information load nahi ho pa rahi.";
        });
    }
  </script>
</body>
</html>
